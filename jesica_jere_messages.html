
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jesica & Jere Messages</title>

<style>
:root {
  --bg:#0b1020;
  --line:rgba(255,255,255,0.08);
  --text:#eef2ff;
  --mine:#2563eb;
  --theirs:#1f2937;
}

body{
margin:0;
background:linear-gradient(180deg,#0b1020 0%,#10172e 100%);
color:var(--text);
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
}

.header{
position:sticky;
top:0;
background:rgba(11,16,32,0.9);
backdrop-filter:blur(10px);
border-bottom:1px solid var(--line);
padding:20px;
}

.wrap{
max-width:1100px;
margin:auto;
padding:24px;
}

h1{
margin:0;
font-size:28px;
}

.chat{
padding-top:20px;
}

.day{
display:flex;
justify-content:center;
margin:25px 0;
}

.day span{
padding:8px 12px;
border-radius:999px;
background:rgba(139,92,246,0.15);
border:1px solid rgba(139,92,246,0.3);
font-size:12px;
}

.msg-row{
display:flex;
margin:10px 0;
}

.msg-row.me{
justify-content:flex-end;
}

.msg{
max-width:70%;
padding:12px 14px;
border-radius:18px;
line-height:1.45;
border:1px solid var(--line);
white-space:pre-wrap;
}

.msg-row.me .msg{
background:linear-gradient(180deg,#2f6df5 0%,#2157ca 100%);
border-bottom-right-radius:6px;
}

.msg-row.them .msg{
background:var(--theirs);
border-bottom-left-radius:6px;
}

.meta{
font-size:11px;
color:rgba(255,255,255,0.6);
margin-bottom:4px;
}

.image-start{
text-align:center;
margin:30px 0;
}

.image-start img{
max-width:420px;
border-radius:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.6);
}
</style>
</head>

<body>

<div class="header">
<div class="wrap">
<h1>Jesica & Jere Messages</h1>
</div>
</div>

<div class="wrap">

<div class="image-start">
<img src="messenger_start.jpeg">
</div>

<div id="chat" class="chat"></div>

</div>

<script src="messages_to_10_10_dataset.js"></script>

<script>
const chat=document.getElementById("chat");
let lastDay=null;

messages.forEach(m=>{

if(m.day!==lastDay){

const d=document.createElement("div");
d.className="day";
d.innerHTML="<span>"+m.day+"</span>";
chat.appendChild(d);

lastDay=m.day;

}

const row=document.createElement("div");
row.className="msg-row "+(m.is_me?"me":"them");

const bubble=document.createElement("div");
bubble.className="msg";

const meta=document.createElement("div");
meta.className="meta";
meta.innerText=m.sender+" • "+m.time;

const text=document.createElement("div");
text.innerText=m.text;

bubble.appendChild(meta);
bubble.appendChild(text);
row.appendChild(bubble);

chat.appendChild(row);

});
</script>

</body>
</html>
