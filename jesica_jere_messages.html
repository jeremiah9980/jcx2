<!DOCTYPE html>
<html lang="en">
<head>
<script src="/jcx2/assets/js/analytics.js"></script>
<script src="/assets/js/analytics.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jesica & Jere Messages</title>

<style>
:root{
--bg1:#040816;
--bg2:#07112b;
--jesica1:#2c394c;
--jesica2:#243143;
--jere1:#4b86ff;
--jere2:#2f67df;
--text:#edf3ff;
--muted:rgba(237,243,255,.78);
--line:rgba(255,255,255,.08);
}

*{box-sizing:border-box}

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
color:var(--text);
background:
radial-gradient(circle at 50% 10%, rgba(32,72,190,.16), transparent 24%),
radial-gradient(circle at 12% 35%, rgba(7,25,86,.28), transparent 30%),
linear-gradient(180deg, var(--bg1) 0%, #030918 40%, var(--bg2) 100%);
}

.topbar{
position:sticky;
top:0;
backdrop-filter:blur(16px);
background:linear-gradient(180deg, rgba(9,14,31,.84), rgba(9,14,31,.54));
border-bottom:1px solid var(--line);
}

.topbar-inner{
max-width:1800px;
margin:auto;
padding:18px 34px;
}

.title{
font-size:28px;
font-weight:700;
margin:0;
}

.hero{
max-width:1800px;
margin:auto;
padding:18px 34px 6px;
}

.hero-card{
margin:auto auto 28px;
width:min(520px,100%);
border-radius:28px;
overflow:hidden;
border:1px solid var(--line);
background:rgba(255,255,255,.02);
box-shadow:0 20px 50px rgba(0,0,0,.35);
}

.hero-card img{
width:100%;
display:block;
}

.chat{
max-width:1800px;
margin:auto;
padding:10px 34px 56px;
}

.day{
display:flex;
justify-content:center;
margin:24px 0 26px;
}

.day span{
padding:10px 16px;
border-radius:999px;
font-size:12px;
letter-spacing:.06em;
text-transform:uppercase;
color:rgba(230,236,255,.8);
background:rgba(255,255,255,.045);
border:1px solid rgba(255,255,255,.08);
}

.msg-row{
display:flex;
margin:12px 0;
}

.msg-row.me{justify-content:flex-end}
.msg-row.them{justify-content:flex-start}

.msg{
width:fit-content;
max-width:min(980px,62vw);
min-width:160px;
border-radius:26px;
padding:22px 22px 16px;
border:1px solid rgba(255,255,255,.07);
box-shadow:0 18px 48px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.05);
white-space:pre-wrap;
word-break:break-word;
line-height:1.45;
font-size:22px;
}

.msg-row.them .msg{
background:linear-gradient(180deg,var(--jesica1),var(--jesica2));
border-top-left-radius:18px;
margin-right:auto;
}

.msg-row.me .msg{
background:linear-gradient(180deg,var(--jere1),var(--jere2));
border-top-right-radius:18px;
margin-left:auto;
}

.meta{
display:flex;
justify-content:space-between;
margin-top:18px;
font-size:14px;
letter-spacing:.08em;
text-transform:uppercase;
color:var(--muted);
}

a{
color:#dfe9ff;
text-decoration:underline;
}

@media (max-width:820px){
.msg{
max-width:88vw;
font-size:17px;
padding:18px;
}
.meta{font-size:12px}
}
</style>
</head>

<body>

<div class="topbar">
<div class="topbar-inner">
<h1 class="title">Jesica & Jere Messages</h1>
</div>
</div>

<div class="hero">
<div class="hero-card">
<img src="messenger_start.jpeg">
</div>
</div>

<div id="chat" class="chat"></div>

<script src="messages_to_10_10_dataset_fixed.js"></script>

<script>
const chat=document.getElementById("chat");
let lastDay=null;

function linkify(text){
const urlRegex=/(https?:\/\/[^\s]+)/g;
return String(text)
.replace(/&/g,"&amp;")
.replace(/</g,"&lt;")
.replace(/>/g,"&gt;")
.replace(urlRegex,'<a href="$1" target="_blank">$1</a>');
}

messages.forEach(m=>{

if(m.day!==lastDay){
const d=document.createElement("div");
d.className="day";
d.innerHTML="<span>"+m.day+"</span>";
chat.appendChild(d);
lastDay=m.day;
}

const row=document.createElement("div");
row.className="msg-row "+(m.is_me?"me":"them");

const bubble=document.createElement("div");
bubble.className="msg";

const text=document.createElement("div");
text.innerHTML=linkify(m.text);

const meta=document.createElement("div");
meta.className="meta";
meta.innerHTML="<span>"+m.sender+"</span><span>"+m.time+"</span>";

bubble.appendChild(text);
bubble.appendChild(meta);

row.appendChild(bubble);
chat.appendChild(row);

});
</script>

</body>
</html>
