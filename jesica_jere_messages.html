
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jesica & Jere Messages</title>
<style>
body{background:#0d0d0d;color:#e6e6e6;font-family:-apple-system,Segoe UI,Roboto;margin:0}
.container{max-width:1000px;margin:auto;padding:40px}
.msg{padding:12px 16px;border-radius:16px;margin-bottom:12px;max-width:70%}
.me{background:#007aff;margin-left:auto}
.them{background:#2b2b2e}
.day{text-align:center;margin:30px 0;color:#aaa;font-size:12px}
</style>
</head>
<body>

<div class="container">

<h2>Jesica & Jere Conversation</h2>

<div style="text-align:center;margin:20px 0">
<img src="messenger_start.jpeg" style="max-width:420px;border-radius:16px">
</div>

<div id="chat"></div>

</div>

<script src="messages_to_10_10_dataset.js"></script>

<script>
const chat=document.getElementById("chat");

let lastDay=null;

messages.forEach(m=>{

if(m.day!==lastDay){

const d=document.createElement("div");
d.className="day";
d.innerText=m.day;

chat.appendChild(d);
lastDay=m.day;

}

const msg=document.createElement("div");
msg.className="msg "+(m.is_me?"me":"them");

msg.innerHTML="<b>"+m.sender+"</b><br>"+m.text+"<div style='font-size:11px;color:#aaa'>"+m.time+"</div>";

chat.appendChild(msg);

});
</script>

</body>
</html>
